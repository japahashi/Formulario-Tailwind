<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Tailwind Formulario</title>
    
</head>
<body class="flex items-center flex-col bg-red-500 gap-5">
    
    <div class="text-white">Criar conta</div>
    <div class="flex content-center gap-4 ">
    <img src="./Img/facebook-icon.png" alt=""/>
    <img src="./Img/google-icon.png" alt=""/>
    <img src="./Img/linkind-icon.png" alt=""/>
    </div>

    <div class="flex gap-4 flex-col">
    <div class="text-white">Ou cadastre seu e-mail</div>
    <input type="text" placeholder="Nome" class="bg-white"/> 
    <input type="text" placeholder="E-mail" class="bg-white"/>
    <input type="text" placeholder="Senha" class="bg-white"/> 
    <button class="flex gap-4 bg-white">Cadastrar</button>
    </div>

    <div class="text-white">Ja tem conta? Login</div>
    

</body>
</html>
